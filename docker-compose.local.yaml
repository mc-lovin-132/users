services:
  users-local-db:
    image: postgres:15-alpine
    container_name: users-local-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  users-local:
    build: .
    container_name: users-local
    restart: unless-stopped
    depends_on:
      users-local-db:
        condition: service_healthy
    networks:
      - internal
      - ext-net
    ports:
      - "${PORT}:${PORT}"

networks:
  internal:
    driver: bridge
    internal: true  
  ext-net:
    external: true
    name: ext-net

volumes:
  postgres_data: